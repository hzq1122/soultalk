name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.x'

      - name: Install flutterfy
        run: dart pub global activate flutterfy

      - name: Update version and build number
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          flutterfy minor --build=$GITHUB_RUN_NUMBER

      - name: Set up signing key
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.keystore
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.keystore
          EOF

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Create Release and Upload APK
        uses: ncipollo/release-action@v1
        with:
          artifacts: build/app/outputs/flutter-apk/*.apk
          tag: ${{ github.ref_name }}
          token: ${{ secrets.GH_TOKEN }}
          allowUpdates: true
