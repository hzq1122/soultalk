name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Static Analysis ──────────────────────────────────────────────
  analyze:
    name: Dart Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.x'

      - name: Install dependencies
        run: flutter pub get

      - name: Run dart analyze
        run: dart analyze . --fatal-infos

  # ── Tests ────────────────────────────────────────────────────────
  test:
    name: Flutter Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.x'

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: coverage
          path: coverage/lcov.info

  # ── Format Check ─────────────────────────────────────────────────
  format:
    name: Dart Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.x'

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

  # ── Android APK Build ────────────────────────────────────────────
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    needs: [analyze, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.x'

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk

  # ── Windows x64 Build ────────────────────────────────────────────
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    needs: [analyze, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.x'

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows
        run: |
          flutter pub get
          flutter build windows --release

      - name: Package Windows build
        shell: pwsh
        run: |
          $zipName = "soultalk-windows-x64.zip"
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath $zipName
          echo "zip_name=$zipName" >> $env:GITHUB_ENV

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v5
        with:
          name: windows-x64
          path: soultalk-windows-x64.zip
