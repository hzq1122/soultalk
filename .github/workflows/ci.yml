name: CI

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Static Analysis ──────────────────────────────────────────────
  analyze:
    name: Dart Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.x'

      - name: Install dependencies (root)
        run: flutter pub get

      - name: Install dependencies (pc)
        run: cd pc && flutter pub get

      - name: Run dart analyze (root)
        run: dart analyze . --fatal-infos

      - name: Run dart analyze (pc)
        run: cd pc && dart analyze . --fatal-infos

  # ── Tests ────────────────────────────────────────────────────────
  test:
    name: Flutter Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.x'

      - name: Install dependencies (root)
        run: flutter pub get

      - name: Install dependencies (pc)
        run: cd pc && flutter pub get

      - name: Run tests (root)
        run: flutter test --coverage

      - name: Run tests (pc)
        run: cd pc && flutter test

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: coverage
          path: coverage/lcov.info

  # ── Format Check ─────────────────────────────────────────────────
  format:
    name: Dart Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.x'

      - name: Check formatting (root)
        run: dart format --set-exit-if-changed .

      - name: Check formatting (pc)
        run: cd pc && dart format --set-exit-if-changed .

  # ── Determine Version from Tag ───────────────────────────────────
  version-info:
    name: Version Info
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      is-release: ${{ steps.version.outputs.IS_RELEASE }}

    steps:
      - name: Parse tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == v* ]]; then
            VERSION="${TAG#v}"
            IS_RELEASE="true"
          else
            VERSION="$TAG"
            IS_RELEASE="false"
            # 非 v-tag 不更新 pubspec.yaml 版本号，避免非法 semver
            echo "Non-release tag, version remains as-is in pubspec.yaml"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "IS_RELEASE=$IS_RELEASE" >> $GITHUB_OUTPUT
          echo "Tag=$TAG → Version=$VERSION, Release=$IS_RELEASE"

  # ── Android APK Build ────────────────────────────────────────────
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    needs: [analyze, test, format, version-info]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.x'

      - name: Update version from tag (v-tags only)
        if: needs.version-info.outputs.is-release == 'true'
        run: |
          VERSION="${{ needs.version-info.outputs.version }}"
          sed -i "s/^version: .*/version: $VERSION/" pubspec.yaml
          echo "Version set to $VERSION from tag"

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk

  # ── PC Windows Build (pc 子项目) ────────────────────────────────
  build-pc-windows:
    name: PC Windows x64
    runs-on: windows-latest
    needs: [analyze, test, format, version-info]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.x'

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Update version from tag (v-tags only)
        if: needs.version-info.outputs.is-release == 'true'
        shell: bash
        run: |
          VERSION="${{ needs.version-info.outputs.version }}"
          sed -i "s/^version: .*/version: $VERSION/" pc/pubspec.yaml
          echo "Version set to $VERSION from tag"

      - name: Build PC Windows
        run: |
          cd pc
          flutter pub get
          flutter build windows --release

      - name: Package PC build
        shell: pwsh
        run: |
          $version = "${{ needs.version-info.outputs.version }}"
          $zipName = "soultalk-pc-windows-x64-v$version.zip"
          Compress-Archive -Path pc\build\windows\x64\runner\Release\* -DestinationPath $zipName
          echo "zip_name=$zipName" >> $env:GITHUB_ENV

      - name: Upload PC artifact
        uses: actions/upload-artifact@v5
        with:
          name: pc-windows-x64
          path: soultalk-pc-windows-x64-*.zip

  # ── Release (v-tag only) ─────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-android, build-pc-windows, version-info]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: |
            artifacts/android-apk/*.apk
            artifacts/pc-windows-x64/*.zip
          tag: ${{ github.ref_name }}
          name: SoulTalk ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          generateReleaseNotes: true
